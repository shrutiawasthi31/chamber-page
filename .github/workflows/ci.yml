name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install validation tools
        run: |
          npm install --no-save htmlhint stylelint stylelint-config-standard

      - name: Validate HTML
        run: npx htmlhint "**/*.html"

      - name: Validate CSS
        run: npx stylelint "**/*.css"

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check auth.js
          node --check server.js
          node --check api/_lib/session.js
          node --check api/_lib/linkedin.js
          node --check api/auth/linkedin.js
          node --check api/auth/linkedin-callback.js
          node --check api/me.js
          node --check api/logout.js
