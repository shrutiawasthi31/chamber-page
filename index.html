<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LexReason Chamber login for AI-powered legal intelligence, case management, research, hearings, and client collaboration."
    />
    <title>LexReason Chamber Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-body">
    <main class="page-shell">
      <!-- Left promotional chamber panel -->
      <section class="hero-panel" aria-label="LexReason Chamber overview">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <header class="brand-lockup">
            <img
              src="assets/lexreason-logo.png"
              alt="LexReason logo"
              class="brand-logo"
              width="220"
              height="72"
            />
          </header>
        </div>
      </section>

      <!-- Right authentication panel -->
      <section class="login-panel" aria-label="Sign in">
        <!-- Lightweight top navigation -->
        <nav class="top-links" aria-label="Secondary navigation">
          <a href="#support">Help</a>
          <a href="#contact">Contact Us</a>
        </nav>

        <!-- Login card -->
        <article class="login-card fade-in">
          <div class="login-card__crest" aria-hidden="true">
            <img src="assets/lexreason-logo.png" alt="" width="164" height="52" />
          </div>
          <header class="login-header">
            <h2>Welcome Back</h2>
            <p>Sign in to access your LexReason Chamber</p>
          </header>

          <!-- Sign-in form -->
          <form id="loginForm" class="login-form" novalidate>
            <div id="emailLoginView" class="login-view login-view--active">
              <div class="field-group">
                <label for="email">Chamber Email</label>
                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M4 6.5A1.5 1.5 0 0 1 5.5 5h13A1.5 1.5 0 0 1 20 6.5v11a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 17.5zm0 1 8 5 8-5" />
                    </svg>
                  </span>
                  <input
                    id="email"
                    name="email"
                    type="email"
                    inputmode="email"
                    autocomplete="email"
                    placeholder="Enter your email"
                    aria-describedby="emailError"
                    required
                  />
                </div>
                <p id="emailError" class="error-message" aria-live="polite"></p>
              </div>

              <div class="field-group">
                <label for="password">Password</label>
                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M7 10V7a5 5 0 0 1 10 0v3m-11 0h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1zm6 4v3"
                      />
                    </svg>
                  </span>
                  <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    placeholder="Enter your password"
                    aria-describedby="passwordError"
                    required
                  />
                  <button
                    class="password-toggle"
                    id="passwordToggle"
                    type="button"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6zm10 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"
                      />
                    </svg>
                  </button>
                </div>
                <p id="passwordError" class="error-message" aria-live="polite"></p>
              </div>

              <div class="form-meta">
                <label class="remember-me" for="rememberMe">
                  <input id="rememberMe" name="rememberMe" type="checkbox" />
                  <span>Remember Me</span>
                </label>
                <a class="meta-link" href="#forgot-password">Forgot Password?</a>
              </div>

              <p id="formError" class="error-message form-error" aria-live="polite"></p>

              <button id="loginButton" class="primary-button" type="submit">
                <span class="button-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path
                      d="M9 7h9a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H9m0-10 4 5-4 5M13 12H4"
                    />
                  </svg>
                </span>
                <span class="button-text">Enter Chamber</span>
                <span class="button-spinner" aria-hidden="true"></span>
              </button>
            </div>

            <div class="auth-switcher">
              <div class="divider" aria-hidden="true">
                <span></span>
                <p>OR</p>
                <span></span>
              </div>

              <div class="social-stack">
                <button class="social-button" id="googleAuthButton" type="button">
                  <span class="social-icon google" aria-hidden="true">G</span>
                  <span>Continue with Google</span>
                </button>
              </div>
            </div>
          </form>

          <footer class="login-footer">
            <p>
              New to LexReason Chamber?
              <a href="#create-account">Create Account</a>
            </p>
          </footer>
        </article>

        <p class="security-note">Your data is secure and encrypted.</p>
      </section>
    </main>

    <script src="firebase-config.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="script.js"></script>
  </body>
</html>
