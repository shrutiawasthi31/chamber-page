<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LexReason login for AI-powered legal intelligence, case memory, research, and counsel collaboration."
    />
    <title>LexReason Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-body">
    <main class="page-shell">
      <section class="hero-panel" aria-label="LexReason product overview">
        <div class="hero-overlay"></div>
      </section>

      <section class="login-panel" aria-label="Sign in">
        <article class="login-card fade-in">
          <header class="login-header">
            <h2>Welcome to <span>LexReason</span></h2>
            <p>Sign In your account</p>
          </header>

          <form id="loginForm" class="login-form" novalidate>
            <div id="emailLoginView" class="login-view login-view--active">
              <div class="field-group">
                <label for="email">Work Email</label>
                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M4 6.5A1.5 1.5 0 0 1 5.5 5h13A1.5 1.5 0 0 1 20 6.5v11a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 17.5zm0 1 8 5 8-5" />
                    </svg>
                  </span>
                  <input
                    id="email"
                    name="email"
                    type="email"
                    inputmode="email"
                    autocomplete="email"
                    placeholder="deanna.curtis@example.com"
                    aria-describedby="emailError"
                    required
                  />
                </div>
                <p id="emailError" class="error-message" aria-live="polite"></p>
              </div>

              <div class="field-group">
                <label for="password">Password</label>
                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M7 10V7a5 5 0 0 1 10 0v3m-11 0h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1zm6 4v3"
                      />
                    </svg>
                  </span>
                  <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    placeholder="Password"
                    aria-describedby="passwordError"
                    required
                  />
                  <button
                    class="password-toggle"
                    id="passwordToggle"
                    type="button"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6zm10 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"
                      />
                    </svg>
                  </button>
                </div>
                <p id="passwordError" class="error-message" aria-live="polite"></p>
              </div>

              <div class="field-group">
                <label for="role">Role</label>
                <div class="input-shell input-shell--select">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.2 0-7 2.2-7 4v1h14v-1c0-1.8-2.8-4-7-4z" />
                    </svg>
                  </span>
                  <select id="role" name="role" aria-label="Role">
                    <option>Independent Litigator</option>
                    <option>Associate</option>
                    <option>Senior Counsel</option>
                    <option>Research Analyst</option>
                  </select>
                </div>
              </div>

              <div class="form-meta">
                <label class="remember-me" for="rememberMe">
                  <input id="rememberMe" name="rememberMe" type="checkbox" />
                  <span>Remember Me</span>
                </label>
                <a class="meta-link" href="#forgot-password">Forgot Password?</a>
              </div>

              <p id="formError" class="error-message form-error" aria-live="polite"></p>

              <button id="loginButton" class="primary-button" type="submit">
                <span class="button-text">Login</span>
                <span class="button-spinner" aria-hidden="true"></span>
              </button>
            </div>

            <div class="auth-switcher">
              <div class="divider" aria-hidden="true">
                <span></span>
                <p>OR Continue With</p>
                <span></span>
              </div>

              <div class="social-row">
                <button class="social-button" id="googleAuthButton" type="button" aria-label="Continue with Google">
                  <span class="social-glyph social-glyph--google">G</span>
                </button>
                <button class="social-button" id="facebookAuthButton" type="button" aria-label="Continue with Facebook">
                  <span class="social-glyph social-glyph--facebook">f</span>
                </button>
                <button class="social-button" id="linkedinAuthButton" type="button" aria-label="Continue with LinkedIn">
                  <span class="social-glyph social-glyph--linkedin">in</span>
                </button>
              </div>
            </div>
          </form>

          <footer class="login-footer">
            <p>
              Don’t have an account?
              <a href="#create-account">Sign Up.</a>
            </p>
          </footer>
        </article>
      </section>
    </main>

    <script src="firebase-config.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="script.js"></script>
  </body>
</html>
