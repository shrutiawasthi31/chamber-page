services:
  - type: web
    name: lexreason-chamber-page
    env: node
    plan: free
    autoDeploy: false
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_SUCCESS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: AUTH_COOKIE_NAME
        value: lexreason_token
      - key: LINKEDIN_STATE_COOKIE_NAME
        value: lexreason_linkedin_oauth_state
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
